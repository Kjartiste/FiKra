<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiKra — Convertisseur Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--panel:#fff;--card:#f7f8fa;
  --b1:rgba(0,0,0,0.07);--b2:rgba(0,0,0,0.13);
  --text:#1a2535;--muted:#8a9ab5;
  --gold:#d4920a;--accent:#1a2535;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;}
.wrap{max-width:680px;margin:0 auto;padding:2rem 1rem;}
h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:30px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:2px;}
.subtitle{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:1.5rem;}
.gold{color:var(--gold);}

.section{background:var(--panel);border:1px solid var(--b2);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.8px;color:var(--muted);text-transform:uppercase;margin-bottom:.75rem;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--b1);}

.stat-row{display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--b1);}
.stat-row:last-child{border-bottom:none;}
.stat-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;color:var(--text);width:120px;flex-shrink:0;text-transform:uppercase;}
.stat-select{background:var(--card);border:1px solid var(--b2);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;padding:4px 8px;border-radius:5px;cursor:pointer;width:70px;}
.stat-select:focus{outline:none;border-color:var(--gold);}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
@media(max-width:480px){.row2{grid-template-columns:1fr;}}

.wide-select{width:100%;background:var(--card);border:1px solid var(--b2);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;padding:6px 8px;border-radius:5px;cursor:pointer;}
.wide-select:focus{outline:none;border-color:var(--gold);}
.type-desc{font-family:'Barlow',sans-serif;font-size:11px;color:var(--muted);margin-top:7px;font-style:italic;}

.results-section{background:var(--accent);border-radius:10px;padding:1rem 1.25rem;}
.results-section .section-title{color:rgba(255,255,255,0.35);}
.results-section .section-title::after{background:rgba(255,255,255,0.1);}
.results{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:.75rem;}
@media(max-width:400px){.results{grid-template-columns:repeat(2,1fr);}}
.result-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:.75rem;text-align:center;}
.result-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:4px;}
.result-val{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;color:#fff;line-height:1;}
.result-detail{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:rgba(255,255,255,0.3);margin-top:4px;letter-spacing:.3px;}

footer{text-align:center;margin-top:2rem;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;}
</style>
</head>
<body>
<div class="wrap">

<h1>Fi<span class="gold">Kra</span></h1>
<div class="subtitle">Convertisseur de stats — Kraland vers Football</div>

<div class="section">
  <div class="section-title">Stats Kraland</div>
  <div class="stat-row"><span class="stat-label">Force</span><select class="stat-select" id="s0" onchange="calc()"><option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option></select></div>
  <div class="stat-row"><span class="stat-label">Volonté</span><select class="stat-select" id="s1" onchange="calc()"><option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option></select></div>
  <div class="stat-row"><span class="stat-label">Charisme</span><select class="stat-select" id="s2" onchange="calc()"><option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option></select></div>
  <div class="stat-row"><span class="stat-label">Gestion</span><select class="stat-select" id="s3" onchange="calc()"><option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option></select></div>
  <div class="stat-row"><span class="stat-label">Intelligence</span><select class="stat-select" id="s4" onchange="calc()"><option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option></select></div>
  <div class="stat-row"><span class="stat-label">Perception</span><select class="stat-select" id="s5" onchange="calc()"><option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option></select></div>
</div>

<div class="row2">
  <div class="section" style="margin-bottom:0">
    <div class="section-title">Carrière</div>
    <select class="wide-select" id="career" onchange="calc()">
      <optgroup label="Guerriers +60">
        <option>Assassin</option><option>Mercenaire</option><option>Officier</option><option>Terroriste</option>
      </optgroup>
      <optgroup label="Aventuriers +50">
        <option>Espion</option><option>Explorateur</option><option>Marin</option>
      </optgroup>
      <optgroup label="Initiés +45">
        <option>Astrologue</option><option>Mentat</option><option>Sorcier</option>
      </optgroup>
      <optgroup label="Religieux +45">
        <option>Inquisiteur</option><option>Missionnaire</option><option>Pretre</option>
      </optgroup>
      <optgroup label="Voleurs +40">
        <option>Cambrioleur</option><option>Criminel</option><option>Faussaire</option>
      </optgroup>
      <optgroup label="Marginaux +40">
        <option>Artiste</option><option>Prostitue</option>
      </optgroup>
      <optgroup label="Metiers +20">
        <option>Agriculteur</option><option>Architecte</option><option>Avocat</option>
        <option>Diplomate</option><option>Informaticien</option><option>Mecanicien</option>
        <option>Medecin</option><option>Negociant</option><option>Trafiquant</option>
      </optgroup>
    </select>
  </div>

  <div class="section" style="margin-bottom:0">
    <div class="section-title">Type</div>
    <select class="wide-select" id="type" onchange="calc()">
      <option value="Aerien">Aerien</option>
      <option value="Agile">Agile</option>
      <option value="Ascete">Ascete</option>
      <option value="Calme">Calme</option>
      <option value="Charismatique">Charismatique</option>
      <option value="Fort">Fort</option>
      <option value="Gestionnaire">Gestionnaire</option>
      <option value="Gourmand">Gourmand</option>
      <option value="Intellectuel">Intellectuel</option>
      <option value="Maritime">Maritime</option>
      <option value="Mutant">Mutant</option>
      <option value="Mystique">Mystique</option>
      <option value="Observateur">Observateur</option>
      <option value="Optimiste">Optimiste</option>
      <option value="Pilier de Bar">Pilier de Bar</option>
      <option value="Sylvestre">Sylvestre</option>
      <option value="Vif">Vif</option>
      <option value="Violent">Violent</option>
      <option value="Volontaire">Volontaire</option>
    </select>
    <div class="type-desc" id="type-desc"></div>
  </div>
</div>

<div class="section">
  <div class="section-title">PVs</div>
  <div class="stat-row">
    <span class="stat-label">Points de vie</span>
    <select class="stat-select" id="pvs" onchange="calc()" style="width:90px">
      <option value="25">25</option>
      <option value="30">30</option>
      <option value="40">40</option>
      <option value="50">50</option>
    </select>
    <span id="pv-desc" style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);font-style:italic;margin-left:4px;"></span>
  </div>
</div>

<div class="results-section">
  <div class="section-title">Stats finales</div>
  <div class="results">
    <div class="result-card"><div class="result-label">Vitesse</div><div class="result-val" id="r0">0</div><div class="result-detail" id="d0"></div></div>
    <div class="result-card"><div class="result-label">Tir</div><div class="result-val" id="r1">0</div><div class="result-detail" id="d1"></div></div>
    <div class="result-card"><div class="result-label">Defense</div><div class="result-val" id="r2">0</div><div class="result-detail" id="d2"></div></div>
    <div class="result-card"><div class="result-label">Endurance</div><div class="result-val" id="r3">0</div><div class="result-detail" id="d3"></div></div>
    <div class="result-card"><div class="result-label">Technique</div><div class="result-val" id="r4">0</div><div class="result-detail" id="d4"></div></div>
    <div class="result-card"><div class="result-label">Resistance</div><div class="result-val" id="r5">0</div><div class="result-detail" id="d5"></div></div>
  </div>
</div>

<footer>K = kraland &nbsp;·&nbsp; C = carriere &nbsp;·&nbsp; T = type</footer>
</div>

<script>
const conv={Force:[3,2,5,0,0,5],Volonte:[1,1,3,5,0,4],Charisme:[3,0,2,0,4,0],Gestion:[1,1,1,8,0,3],Intelligence:[2,3,1,0,4,0],Perception:[4,6,4,0,5,0]};
const kNames=["Force","Volonte","Charisme","Gestion","Intelligence","Perception"];
const careers={
  "Assassin":[20,15,5,5,15,0],"Mercenaire":[8,12,15,10,5,10],"Officier":[8,8,15,8,15,6],"Terroriste":[15,20,10,5,5,5],
  "Espion":[15,10,5,5,15,0],"Explorateur":[15,5,5,15,5,5],"Marin":[5,5,10,15,5,10],
  "Astrologue":[3,5,5,2,25,5],"Mentat":[5,10,5,0,25,0],"Sorcier":[5,15,5,0,20,0],
  "Inquisiteur":[5,5,15,5,5,10],"Missionnaire":[5,0,5,5,25,5],"Pretre":[0,0,10,5,25,5],
  "Cambrioleur":[20,5,5,0,10,0],"Criminel":[5,10,10,5,5,5],"Faussaire":[5,5,0,0,30,0],
  "Artiste":[5,5,0,0,30,0],"Prostitue":[10,0,5,0,25,0],
  "Agriculteur":[2,0,3,10,0,5],"Architecte":[0,3,2,0,15,0],"Avocat":[0,0,5,0,15,0],
  "Diplomate":[3,0,2,0,15,0],"Informaticien":[0,3,0,0,17,0],"Mecanicien":[0,0,5,0,15,0],
  "Medecin":[0,0,5,0,10,5],"Negociant":[0,5,0,0,15,0],"Trafiquant":[5,5,0,0,10,0]
};
const types={
  "Aerien":      {desc:"Mobilite, jeu dans l'espace",        vals:[18,4,5,0,8,0]},
  "Agile":       {desc:"Explosivite pure",                   vals:[22,0,5,0,8,0]},
  "Ascete":      {desc:"Discipline corporelle",              vals:[0,0,8,10,7,10]},
  "Calme":       {desc:"Sang-froid en toute situation",      vals:[0,8,8,0,19,0]},
  "Charismatique":{desc:"Presence sur le terrain",          vals:[8,0,5,0,22,0]},
  "Fort":        {desc:"Puissance physique",                 vals:[0,6,15,0,0,14]},
  "Gestionnaire":{desc:"Gestion du rythme",                  vals:[3,0,5,18,0,9]},
  "Gourmand":    {desc:"Corps solide, vitesse reduite",      vals:[-2,0,12,10,0,15]},
  "Intellectuel":{desc:"Analyse et vision du jeu",           vals:[0,8,3,0,24,0]},
  "Maritime":    {desc:"A l'aise dans les conditions dures", vals:[3,0,10,12,0,10]},
  "Mutant":      {desc:"Capacites inhabituelles",            vals:[8,6,6,0,8,7]},
  "Mystique":    {desc:"Intuition et pouvoirs",              vals:[0,10,5,0,20,0]},
  "Observateur": {desc:"Vision et lecture du jeu",           vals:[5,15,10,0,5,0]},
  "Optimiste":   {desc:"Energie mentale intarissable",       vals:[8,0,0,10,12,5]},
  "Pilier de Bar":{desc:"Robuste, difficile a bouger",       vals:[0,0,15,5,0,15]},
  "Sylvestre":   {desc:"Agilite naturelle",                  vals:[15,0,8,5,7,0]},
  "Vif":         {desc:"Reflexes et rapidite d'execution",   vals:[20,7,0,0,8,0]},
  "Violent":     {desc:"Agressivite et duels",               vals:[0,10,12,0,0,13]},
  "Volontaire":  {desc:"Mental d'acier",                     vals:[0,0,10,15,0,10]}
};
const pvBonus={
  25:{res:0, end:0, desc:'Aucun bonus'},
  30:{res:10,end:0, desc:'+10 Resistance'},
  40:{res:20,end:10,desc:'+20 Resistance  +10 Endurance'},
  50:{res:20,end:20,desc:'+20 Resistance  +20 Endurance'}
};
function calc(){
  const vals=kNames.map((_,i)=>parseInt(document.getElementById('s'+i).value)||0);
  const kraland=[0,0,0,0,0,0];
  kNames.forEach((k,i)=>{conv[k].forEach((v,j)=>{kraland[j]+=vals[i]*v;});});
  const cname=document.getElementById('career').value;
  const cbonus=careers[cname]||[0,0,0,0,0,0];
  const tname=document.getElementById('type').value;
  const tdata=types[tname]||{desc:'',vals:[0,0,0,0,0,0]};
  document.getElementById('type-desc').textContent=tdata.desc;
  const pv=parseInt(document.getElementById('pvs').value)||25;
  const pb=pvBonus[pv];
  document.getElementById('pv-desc').textContent=pb.desc;
  // pv bonus: index 3=endurance, index 5=resistance
  const pvVals=[0,0,0,pb.end,0,pb.res];
  for(let j=0;j<6;j++){
    const total=kraland[j]+cbonus[j]+tdata.vals[j]+pvVals[j];
    document.getElementById('r'+j).textContent=total;
    const parts=[];
    if(kraland[j]) parts.push('K '+kraland[j]);
    if(cbonus[j]) parts.push('C '+cbonus[j]);
    if(tdata.vals[j]) parts.push('T '+(tdata.vals[j]>0?'+':'')+tdata.vals[j]);
    if(pvVals[j]) parts.push('PV +'+pvVals[j]);
    document.getElementById('d'+j).textContent=parts.join('  ');
  }
}
calc();
</script>
</body>
</html>
